<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SciDiscover | AI Research Assistant</title>
    
    <!-- Base tag for GitHub Pages compatibility -->
    <base href="/">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app">
        <!-- Main Content -->
        <main class="main">
            <div class="landing-container">
                <!-- SciDiscover Title -->
                <h1 class="landing-title">
                    <span class="gradient-text">SciDiscover</span>
                </h1>
                
                <!-- Floating Logo -->
                <div class="landing-logo-wrapper">
                    <img src="assets/images/logo.png" alt="SciDiscover" class="landing-logo">
                </div>
                
                <!-- Description -->
                <p class="landing-description">
                    AI-powered research assistant that uncovers hidden connections 
                    across neuroscience, AI, medicine, and physics. 
                    Millions of papers. One intelligent search.
                </p>
                
                <!-- Get Started Button -->
                <div class="landing-button-wrapper">
                    <a href="login.html" class="btn btn-primary btn-large">
                        Get Started <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer-simple">
            <p>&copy; 2026 Divine Achiever · MIT License</p>
        </footer>
    </div>

    <!-- JavaScript Files -->
    <script src="config/constants.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
